version: "2"
sql:
  # PostgreSQL → Module Patient
  - engine: "postgresql"
    schema: "./migrations/postgres"
    queries: "./internal/modules/patient/repository/queries.sql"
    gen:
      go:
        package: "query"
        sql_package: "pgx/v5"
        out: "internal/modules/patient/repository/query"
        emit_interface: true
        emit_json_tags: true

  # PostgreSQL → Module Billing (DB sama, tapi output dipisah)
  - engine: "postgresql"
    schema: "./migrations/postgres"
    queries: "./internal/modules/billing/repository/queries.sql"
    gen:
      go:
        package: "query"
        sql_package: "pgx/v5"
        out: "internal/modules/billing/repository/query"
        emit_interface: true
        emit_json_tags: true

  # MySQL → Module Appointment
  - engine: "mysql"
    schema: "./migrations/mysql"
    queries: "./internal/modules/appointment/repository/queries.sql"
    gen:
      go:
        package: "query"
        sql_package: "database/sql"
        out: "internal/modules/appointment/repository/query"
        emit_interface: true
        emit_json_tags: true
